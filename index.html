<style></style>
<main></main>

<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library@1.0.1/build/nn.min.js"></script>

<script>

  function emoji () {
    let x = nn.mouseX
    let y = nn.mouseY
  nn.create('h1')
  .content('🦖')
  .addTo('main')
    .positionOrigin('center')
  .position(x, y)
  .scale(nn.random(3))
  .rotate(nn.random(360))
  .hueRotate(nn.random(360))
    
    //
    
  }
  nn.times(300, emoji)
 nn.on('mousemove', emoji)
  
</script>
